<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MC 음성 미리듣기</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        background: #06070d;
        color: #f3f6ff;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 40px 16px;
      }
      h1 {
        font-size: 22px;
        margin: 0 0 6px;
      }
      p.sub {
        color: #8b93b4;
        margin: 0 0 28px;
        text-align: center;
        line-height: 1.6;
      }
      .card {
        width: min(520px, 100%);
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 16px;
        padding: 18px 20px;
        margin-bottom: 16px;
      }
      .card.current {
        border-color: #00ffc6;
        box-shadow: 0 0 24px rgba(0, 255, 198, 0.18);
      }
      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 12px;
      }
      .name {
        font-weight: 800;
        font-size: 16px;
      }
      .meta {
        font-size: 12px;
        color: #8b93b4;
      }
      .badge {
        font-size: 11px;
        font-weight: 800;
        color: #06070d;
        background: #00ffc6;
        padding: 3px 8px;
        border-radius: 999px;
      }
      audio {
        width: 100%;
      }
      code {
        background: rgba(255, 255, 255, 0.08);
        padding: 2px 6px;
        border-radius: 6px;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <h1>🎤 MC 음성 미리듣기</h1>
    <p class="sub">
      세 가지 한국어 음성을 들어보고 마음에 드는 걸 고르세요.<br />
      고른 보이스 이름을 알려주시면 MC 음성으로 바로 적용해 드려요.
    </p>

    <div class="card current">
      <div class="row">
        <div>
          <div class="name">InJoon <span class="meta">· 남성</span></div>
          <div class="meta"><code>ko-KR-InJoonNeural</code></div>
        </div>
        <span class="badge">현재 사용 중</span>
      </div>
      <audio controls preload="none" src="ko-KR-InJoonNeural.mp3"></audio>
    </div>

    <div class="card">
      <div class="row">
        <div>
          <div class="name">Hyunsu <span class="meta">· 남성 (멀티링궐)</span></div>
          <div class="meta"><code>ko-KR-HyunsuMultilingualNeural</code></div>
        </div>
      </div>
      <audio controls preload="none" src="ko-KR-HyunsuMultilingualNeural.mp3"></audio>
    </div>

    <div class="card">
      <div class="row">
        <div>
          <div class="name">SunHi <span class="meta">· 여성</span></div>
          <div class="meta"><code>ko-KR-SunHiNeural</code></div>
        </div>
      </div>
      <audio controls preload="none" src="ko-KR-SunHiNeural.mp3"></audio>
    </div>
  </body>
</html>
