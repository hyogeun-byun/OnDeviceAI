camera_id: camera_01
server_url: http://192.168.0.10:8000
camera_index: 0
frame_width: 640
frame_height: 480
jpeg_quality: 80
fps: 10
pose_enabled: true
# Path to the MoveNet SinglePose Lightning int8 TFLite model.
# Defaults to camera-worker/models/movenet-singlepose-lightning-tflite-int8.tflite
pose_model_path: models/movenet-singlepose-lightning-tflite-int8.tflite
# Number of CPU threads for TFLite inference. 4 is a good default for Pi 4/5.
pose_num_threads: 4
pose_draw_landmarks: true
